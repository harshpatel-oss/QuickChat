<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- chat bubble -->
  <path
    d="M18 22c0-3.314 2.686-6 6-6h16c3.314 0 6 2.686 6 6v10c0 3.314-2.686 6-6 6H28l-7 6v-6h-3c-3.314 0-6-2.686-6-6z"
    fill="#ffffff"
  />

  <!-- typing dots -->
  <circle cx="26" cy="27" r="2.4" fill="#6366f1"/>
  <circle cx="34" cy="27" r="2.4" fill="#6366f1"/>
  <circle cx="42" cy="27" r="2.4" fill="#6366f1"/>

  <!-- small online-status dot -->
